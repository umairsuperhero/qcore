services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: qcore
      POSTGRES_USER: qcore
      POSTGRES_PASSWORD: qcore
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qcore"]
      interval: 5s
      timeout: 5s
      retries: 5

  hss:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.hss
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      QCORE_DATABASE_HOST: postgres
      QCORE_DATABASE_PORT: "5432"
      QCORE_DATABASE_USER: qcore
      QCORE_DATABASE_PASSWORD: qcore
      QCORE_DATABASE_NAME: qcore
      QCORE_DATABASE_SSL_MODE: disable
      QCORE_LOGGING_FORMAT: json
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  spgw:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.spgw
    ports:
      - "2152:2152/udp"
      - "8082:8082"
      - "9092:9092"
    environment:
      QCORE_SPGW_BIND_ADDRESS: 0.0.0.0
      QCORE_SPGW_SGW_U1_ADDR: spgw
      QCORE_METRICS_PORT: "9092"
      QCORE_LOGGING_FORMAT: json
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  mme:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.mme
    ports:
      - "36412:36412"
      - "8081:8081"
      - "9091:9091"
    depends_on:
      hss:
        condition: service_healthy
      spgw:
        condition: service_healthy
    environment:
      QCORE_MME_HSS_URL: http://hss:8080
      QCORE_MME_SPGW_URL: http://spgw:8082
      QCORE_MME_BIND_ADDRESS: 0.0.0.0
      QCORE_MME_SCTP_MODE: tcp
      QCORE_METRICS_PORT: "9091"
      QCORE_LOGGING_FORMAT: json

volumes:
  pgdata:
